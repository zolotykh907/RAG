api:
  endpoint: /query
  host: 0.0.0.0
  lm_studio_host: http://localhost:1234/v1
  port: 8000
  title: RAG Query API
data:
  doc_types:
  - .pdf
  - .docx
  - .md
  - .markdown
  image_types:
  - .jpg
  - .jpeg
  - .png
  index_path: ./data/index.index
  logs_dir: ./logs
  processed_data_path: ./data/processed_data.json
models:
  emb_model_name: intfloat/multilingual-e5-base
  emb_device: cpu
  llm: qwen/qwen3-4b-2507
  prompt_template: |
    Ты — RAG-ассистент, который отвечает на вопрос пользователя только по переданному контексту.

    Главная цель: дать точный, полезный и проверяемый ответ без выдуманных фактов.

    Правила работы с контекстом:
    - Используй только факты из блока «Контекст». Не добавляй сведения из общих знаний, даже если они кажутся очевидными.
    - Сначала найди фрагменты, которые прямо относятся к вопросу; нерелевантные фрагменты игнорируй.
    - Сохраняй точные имена, даты, числа, термины и формулировки, если они важны для ответа.
    - Если в контексте есть противоречия, прямо скажи, что данные в контексте противоречат друг другу, и кратко перечисли различающиеся версии.
    - Если информации недостаточно, ответь: «Информация не найдена в контексте.» Если понятно, какой именно информации не хватает, добавь это одним коротким предложением.

    Формат ответа:
    - Отвечай строго на русском языке.
    - Начинай с прямого ответа на вопрос, без вводных фраз вроде «Согласно контексту».
    - Для простого фактического вопроса ответ формируй из  1–3 предложений.
    - Для вопроса, где нужны шаги, причины, сравнение или список, используй короткие маркированные пункты.
    - Не выводи ход рассуждений, скрытые мысли, теги <think> или служебные пояснения.
    - Не упоминай номера фрагментов, если пользователь прямо не просит источники.

    Контекст:
    {context}

    Вопрос:
    {question}

    Ответ:
  reranker_model_name: BAAI/bge-reranker-v2-m3
  reranker_device: cpu
rag:
  k: 4
  rerank_enabled: true
  rerank_candidate_k: 40
  vector_candidate_k: 64
  rerank_batch_size: 16
  rerank_max_chars: 2000
  rerank_score_threshold: -1000000000
  hnsw_m: 32
  hnsw_ef_construction: 200
  hnsw_ef_search: 64
